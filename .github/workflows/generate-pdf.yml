name: Generate PDFs

on:
  push:
    branches:
      - main
    paths:
      - "gec_notes_patch*.html"

permissions:
  contents: write

jobs:
  generate-pdfs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: npx puppeteer browsers install chrome

      - run: npm run generate-pdfs

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Generate PDF release notes
          file_pattern: "*.pdf"
